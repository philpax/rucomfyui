[workspace]
changelog_update = false
semver_check = false
publish_timeout = "10m"
repo_url = "https://github.com/philpax/rucomfyui"

# All publishable crates share a single version via version_group.
# release-plz bumps them together to the highest next-version among the group.
[[package]]
name = "rucomfyui"
version_group = "rucomfyui"

[[package]]
name = "rucomfyui_mlua"
version_group = "rucomfyui"

[[package]]
name = "rucomfyui_node_graph"
version_group = "rucomfyui"

[[package]]
name = "rucomfyui_workflow_converter"
version_group = "rucomfyui"

# Non-publishable crates: exclude from release processing entirely.
# `publish = false` mirrors each crate's Cargo.toml `publish = false` field,
# which release-plz validates for consistency.
[[package]]
name = "rucomfyui_workflow_converter_cli"
publish = false
release = false

[[package]]
name = "rucomfyui_node_graph_demo"
publish = false
release = false

[[package]]
name = "rucomfyui_lua_script_runner"
publish = false
release = false

[[package]]
name = "rucomfyui_generate_nodes"
publish = false
release = false
