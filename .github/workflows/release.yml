name: Release

on:
  push:
    tags:
      # cargo-release creates a single consolidated tag `v<version>`
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to create the release from (e.g. rucomfyui-v1.0.0-rc2)"
        required: true
        type: string

jobs:
  check-ci:
    name: Wait for CI
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.check.outputs.result }}
    steps:
      - name: Wait for Rust CI to pass
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            // The commit being released
            const sha = context.sha;
            
            // Poll for the CI workflow run on this commit
            const maxAttempts = 60;
            const delayMs = 10000;
            
            for (let i = 0; i < maxAttempts; i++) {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: 'ci.yml',
                head_sha: sha,
                status: 'completed',
              });
              
              if (runs.data.workflow_runs.length > 0) {
                const run = runs.data.workflow_runs[0];
                if (run.conclusion === 'success') {
                  core.setOutput('result', 'success');
                  core.info(`CI passed: ${run.html_url}`);
                  return;
                } else {
                  core.setFailed(`CI failed with conclusion: ${run.conclusion}`);
                  core.info(`See: ${run.html_url}`);
                  return;
                }
              }
              
              core.info(`Waiting for CI to complete on ${sha} (attempt ${i + 1}/${maxAttempts})...`);
              await new Promise(r => setTimeout(r, delayMs));
            }
            
            core.setFailed('Timed out waiting for CI to complete');

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: check-ci
    if: ${{ github.repository_owner == 'philpax' }}
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish rucomfyui
        run: cargo publish -p rucomfyui
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish rucomfyui_generate_nodes
        run: cargo publish -p rucomfyui_generate_nodes
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish rucomfyui_mlua
        run: cargo publish -p rucomfyui_mlua
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish rucomfyui_node_graph
        run: cargo publish -p rucomfyui_node_graph
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish rucomfyui_workflow_converter
        run: cargo publish -p rucomfyui_workflow_converter
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(inputs.tag || github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
