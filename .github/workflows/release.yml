name: CI & Release

on:
  push:
    branches:
      - main
    tags:
      # cargo-release creates a single consolidated tag `v<version>`
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to create the release from (e.g. v1.0.0)"
        required: true
        type: string

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy without features
        run: cargo clippy --all --no-default-features -- -D warnings

      - name: Run Clippy with typed_nodes
        run: cargo clippy --all --features typed_nodes -- -D warnings

      - name: Run tests
        run: cargo test --all --features typed_nodes

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: check
    if: ${{ startsWith(github.ref, 'refs/tags/v') || inputs.tag != '' }}
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish rucomfyui
        run: cargo publish -p rucomfyui
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish rucomfyui_generate_nodes
        run: cargo publish -p rucomfyui_generate_nodes
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish rucomfyui_mlua
        run: cargo publish -p rucomfyui_mlua
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish rucomfyui_node_graph
        run: cargo publish -p rucomfyui_node_graph
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish rucomfyui_workflow_converter
        run: cargo publish -p rucomfyui_workflow_converter
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(inputs.tag || github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
